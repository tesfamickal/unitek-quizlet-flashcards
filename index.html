<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unitek Pre Reqs CH. 1 & 2 Flashcards</title>
<style>
:root { color-scheme: dark; --bg:#0f1115; --panel:#151923; --card:#171b26; --card2:#1d2433; --line:#2b3142; --text:#f2f2f2; --muted:#aeb7c8; --accent:#8ea2ff; --accent2:#69e3c5; }
* { box-sizing:border-box; }
body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background:var(--bg); color:var(--text); line-height:1.45; }
header { position:sticky; top:0; z-index:5; background:rgba(21,25,35,.97); backdrop-filter: blur(10px); padding:14px; border-bottom:1px solid var(--line); }
h1 { font-size:1.1rem; margin:0 0 10px; }
.controls { display:grid; grid-template-columns:1fr; gap:8px; }
#search { width:100%; padding:12px; border-radius:10px; border:1px solid #3b4358; background:#0f1115; color:#fff; font-size:1rem; }
.buttons { display:flex; gap:8px; }
.action { flex:1; border:1px solid #3b4358; background:#1c2230; color:#f2f2f2; padding:10px; border-radius:10px; font-weight:650; }
.action:active { transform: scale(.99); }
main { padding:12px; max-width:760px; margin:auto; }
.meta { color:var(--muted); font-size:.9rem; margin:8px 0 14px; }
.card { display:block; width:100%; min-height:190px; margin:12px 0; padding:0; border:0; background:transparent; color:inherit; text-align:left; perspective:1000px; cursor:pointer; -webkit-tap-highlight-color: transparent; }
.card-inner { position:relative; width:100%; min-height:190px; transition:transform .34s ease; transform-style:preserve-3d; }
.card.flipped .card-inner { transform:rotateY(180deg); }
.card-face { position:absolute; inset:0; display:grid; grid-template-columns:46px 1fr; grid-template-rows:auto 1fr auto; gap:4px 10px; align-items:center; min-height:190px; padding:16px; border:1px solid var(--line); border-radius:18px; backface-visibility:hidden; box-shadow:0 10px 28px rgba(0,0,0,.22); }
.card-front { background:linear-gradient(145deg, var(--card), #111722); }
.card-back { background:linear-gradient(145deg, var(--card2), #12211f); transform:rotateY(180deg); }
.num { grid-row:1 / span 3; color:var(--accent); font-weight:800; font-size:1.05rem; align-self:start; }
.label { color:var(--muted); font-size:.75rem; font-weight:800; letter-spacing:.12em; }
.term { font-size:1.6rem; font-weight:800; align-self:center; overflow-wrap:anywhere; }
.definition { font-size:1.2rem; color:#eef3ff; align-self:center; overflow-wrap:anywhere; }
.hint { color:var(--muted); font-size:.85rem; align-self:end; }
.card-back .num, .card-back .label { color:var(--accent2); }
.hidden { display:none; }
.count { color:var(--accent); font-weight:700; }
@media (min-width:700px) { .controls { grid-template-columns:1fr auto; align-items:center; } .buttons { min-width:240px; } }
</style>
</head>

<script>
const search = document.getElementById('search');
const cards = [...document.querySelectorAll('.card')];
const visibleCount = document.getElementById('visibleCount');
function updateVisible() {
  const q = search.value.trim().toLowerCase();
  let count = 0;
  cards.forEach(c => {
    const show = !q || c.dataset.text.includes(q);
    c.classList.toggle('hidden', !show);
    if (show) count++;
  });
  visibleCount.textContent = count;
}
cards.forEach(card => {
  card.addEventListener('click', () => {
    card.classList.toggle('flipped');
    card.setAttribute('aria-expanded', card.classList.contains('flipped') ? 'true' : 'false');
  });
});
search.addEventListener('input', updateVisible);
document.getElementById('showTerms').addEventListener('click', () => {
  cards.forEach(c => { c.classList.remove('flipped'); c.setAttribute('aria-expanded','false'); });
});
document.getElementById('showDefs').addEventListener('click', () => {
  cards.forEach(c => { c.classList.add('flipped'); c.setAttribute('aria-expanded','true'); });
});
updateVisible();
</script>
